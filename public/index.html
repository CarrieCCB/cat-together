<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 微信适配：固定视口、禁止缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- 适配 iOS / 微信内置浏览器全屏 Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>线上小猫 · 双人养猫</title>
  <style>
    /* ============================================================
       全局与布局
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --c-fullness: #FF9F43;   /* 饱腹 橙 */
      --c-happiness: #FF6B9D;  /* 快乐 粉 */
      --c-cleanliness: #4A9EFF;/* 清洁 蓝 */
      --c-energy: #2ED573;     /* 精力 绿 */
      --c-A: #2ED573;          /* 用户A 绿 */
      --c-B: #4A9EFF;          /* 用户B 蓝 */
      --c-gold: #FFB800;       /* 里程碑 金 */
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #fff3e0 0%, #ffe0ec 55%, #e3f0ff 100%);
      color: #4a3728;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
      overflow-x: hidden;
    }
    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(4px);
      position: relative;
    }

    /* ============================================================
       顶部栏
       ============================================================ */
    .topbar {
      padding: 12px 16px 8px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.35));
      border-bottom: 1px solid rgba(255,140,0,0.15);
    }
    .topbar h1 {
      font-size: 20px;
      color: #ff7a00;
      letter-spacing: 2px;
      text-shadow: 0 2px 0 #fff;
    }
    .topbar h1 .paw { font-size: 18px; }
    .topline {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    .stage-badge {
      background: #ff7a00;
      color: #fff;
      padding: 2px 12px;
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(255,122,0,0.35);
    }
    .presence { display: flex; align-items: center; gap: 8px; }
    .dot {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 999px;
      background: rgba(255,255,255,0.7);
      font-weight: 600;
    }
    .dot i {
      width: 9px; height: 9px; border-radius: 50%;
      background: #ccc; display: inline-block;
      transition: background .3s, box-shadow .3s;
    }
    .dot.A i.on { background: var(--c-A); box-shadow: 0 0 6px var(--c-A); }
    .dot.B i.on { background: var(--c-B); box-shadow: 0 0 6px var(--c-B); }
    .total-badge {
      background: rgba(255,184,0,0.18);
      color: #d98600; font-weight: 700;
      padding: 2px 10px; border-radius: 999px;
    }
    .offline-hint {
      margin-top: 6px; font-size: 12px; color: #999;
      height: 16px; transition: opacity .3s;
    }

    /* ============================================================
       舞台区（猫窝 + 猫咪 + 气泡）
       ============================================================ */
    .stage {
      position: relative;
      flex: 0 0 auto;
      height: 340px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }
    /* 猫窝（纯 CSS 绘制） */
    .bed {
      position: absolute;
      bottom: 18px; left: 50%; transform: translateX(-50%);
      width: 260px; height: 90px;
      background: radial-gradient(ellipse at 50% 30%, #ffd59e 0%, #f7b267 70%, #e8974a 100%);
      border-radius: 50% 50% 46% 46% / 60% 60% 40% 40%;
      box-shadow: inset 0 8px 14px rgba(255,255,255,0.5), 0 10px 20px rgba(200,120,40,0.25);
      border: 6px solid #f0a95a;
    }
    .bed::before {
      content: ""; position: absolute; inset: 10px 14px 40px;
      background: radial-gradient(ellipse at 50% 40%, #ffe9cf, #ffd7a8);
      border-radius: 50%;
    }

    /* 猫咪整体缩放容器（体型随成长变化） */
    .cat-scale {
      position: absolute;
      bottom: 40px; left: 50%;
      transform: translateX(-50%) scale(0.9);
      transform-origin: bottom center;
      transition: transform .6s cubic-bezier(.34,1.56,.64,1);
      z-index: 2;
    }

    /* 叫声气泡 */
    .speech {
      position: absolute;
      top: 20px; left: 50%; transform: translateX(-50%);
      background: #fff; color: #ff7a00; font-weight: 700;
      padding: 6px 14px; border-radius: 16px; font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: bubbleFloat 3s ease-in-out infinite;
      z-index: 5; white-space: nowrap;
    }
    .speech::after {
      content: ""; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
      border: 7px solid transparent; border-top-color: #fff; border-bottom: 0;
    }
    @keyframes bubbleFloat { 0%,100%{ transform: translateX(-50%) translateY(0);} 50%{ transform: translateX(-50%) translateY(-6px);} }

    /* 浮动反馈文字 */
    .float-feedback {
      position: absolute; left: 50%; top: 120px;
      transform: translateX(-50%);
      background: rgba(74,55,40,0.9); color: #fff;
      padding: 8px 16px; border-radius: 999px; font-size: 13px;
      pointer-events: none; z-index: 20; white-space: nowrap;
      animation: floatUp 2s ease-out forwards;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(.8); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      80% { opacity: 1; transform: translateX(-50%) translateY(-30px); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
    }
  </style>
</head>
<body>
  <style>
    /* ============================================================
       纯 CSS 二次元橘猫
       结构：tail / body(+belly+stripes) / legs / head(+ears+eyes+nose+mouth+whiskers) / collar+bell
       坐标基于 .cat 220x250 的相对定位
       ============================================================ */
    .cat { position: relative; width: 220px; height: 250px; }
    .cat-svg { width: 100%; height: 100%; display: block; overflow: visible; }

    /* 尾巴摆动（蓬松卷曲） */
    .cat-tail {
      transform-box: fill-box; transform-origin: 24% 92%;
      animation: tailSwing 1.9s ease-in-out infinite;
    }
    @keyframes tailSwing { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(11deg); } }

    /* 头部（吃 / 蹭 动画的作用对象） */
    .cat-head { transform-box: fill-box; transform-origin: center 90%; }

    /* 身体（睡觉呼吸起伏） */
    .cat-body { transform-box: fill-box; transform-origin: center bottom; }
    .cat.mood-sleep .cat-body { animation: breathe 3.2s ease-in-out infinite; }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

    /* 正常态：定时眨眼（眯眼） */
    .eyes-open { transform-box: fill-box; transform-origin: center; }
    .cat.mood-normal .eyes-open { animation: blink 4.6s ease-in-out infinite; }
    @keyframes blink { 0%,90%,100% { transform: scaleY(1); } 94% { transform: scaleY(.12); } 97% { transform: scaleY(1); } }

    /* 开心态：尾巴摆动更欢快 */
    .cat.mood-happy .cat-tail { animation-duration: .85s; }

    /* ZZZ 睡觉标识上浮 */
    .cat-zzz text { transform-box: fill-box; animation: zzzFloat 2s ease-in-out infinite; }
    .cat-zzz text:nth-of-type(2) { animation-delay: .3s; }
    .cat-zzz text:nth-of-type(3) { animation-delay: .6s; }
    @keyframes zzzFloat { 0%,100% { opacity: .35; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }

    /* ---------- 操作动画（作用于整只猫或头部） ---------- */
    .cat.anim-jump { animation: catJump .6s ease; }
    @keyframes catJump { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-28px); } 55% { transform: translateY(-6px); } 75% { transform: translateY(-16px); } }
    .cat.anim-eat .cat-head { animation: eatBob .45s ease 2; }
    @keyframes eatBob { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(9px) rotate(-2deg); } }
    .cat.anim-nuzzle .cat-head { animation: nuzzle .6s ease; }
    @keyframes nuzzle { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
    .cat.anim-shake { animation: catShake .5s ease; }
    @keyframes catShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px) rotate(-3deg); } 40% { transform: translateX(8px) rotate(3deg); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }

    /* ============================================================
       属性 / 成长进度条
       ============================================================ */
    .panel { padding: 6px 16px 10px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin-bottom: 8px; }
    .stat-row { display: flex; align-items: center; gap: 8px; }
    .stat-label { font-size: 12px; width: 34px; flex: 0 0 auto; color: #6b5544; font-weight: 600; }
    .bar { flex: 1; height: 12px; background: rgba(0,0,0,0.08); border-radius: 999px; overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 50%; border-radius: 999px; transition: width .5s ease; }
    .bar.fullness > i { background: linear-gradient(90deg, #ffcf87, var(--c-fullness)); }
    .bar.happiness > i { background: linear-gradient(90deg, #ffb3cf, var(--c-happiness)); }
    .bar.cleanliness > i { background: linear-gradient(90deg, #a9d4ff, var(--c-cleanliness)); }
    .bar.energy > i { background: linear-gradient(90deg, #a6f0c6, var(--c-energy)); }
    .stat-val { font-size: 11px; width: 26px; text-align: right; color: #8a7461; }

    .growth { margin-top: 4px; }
    .growth-top { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #6b5544; }
    .growth-top b { color: #ff7a00; }
    .growth-bar { height: 14px; background: rgba(0,0,0,0.08); border-radius: 999px; overflow: hidden; }
    .growth-bar > i { display: block; height: 100%; width: 0; border-radius: 999px; background: linear-gradient(90deg, #ffd36b, #ff7a00); transition: width .6s ease; }

    /* ============================================================
       操作按钮
       ============================================================ */
    .actions { display: flex; gap: 8px; padding: 8px 12px 12px; }
    .btn {
      flex: 1; position: relative; min-height: 60px; border: 0; border-radius: 16px;
      font-size: 15px; font-weight: 700; color: #fff; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.12); transition: transform .1s, filter .2s, opacity .2s;
      touch-action: manipulation;
    }
    .btn .ico { font-size: 20px; line-height: 1; }
    .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }
    .btn.feed  { background: linear-gradient(160deg, #ffb04a, #ff8a00); }
    .btn.play  { background: linear-gradient(160deg, #ff8fb4, #ff5c8a); }
    .btn.clean { background: linear-gradient(160deg, #6fb6ff, #3a8bff); }
    .btn.pet   { background: linear-gradient(160deg, #59d98a, #23b862); }
    .btn:disabled, .btn.cooling { filter: grayscale(0.7) brightness(0.9); opacity: .75; cursor: not-allowed; }
    .btn .cd {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); border-radius: 16px; font-size: 18px; font-weight: 800;
    }
    .btn.cooling .cd { display: flex; }

    /* ============================================================
       喂养记录
       ============================================================ */
    .records-wrap { flex: 1; display: flex; flex-direction: column; padding: 4px 12px 16px; min-height: 120px; }
    .records-title { font-size: 13px; color: #8a7461; font-weight: 700; margin-bottom: 6px; padding-left: 4px; }
    .records {
      flex: 1; overflow-y: auto; background: rgba(255,255,255,0.6);
      border-radius: 14px; padding: 8px 10px; max-height: 220px;
      -webkit-overflow-scrolling: touch;
    }
    .rec { font-size: 12.5px; line-height: 1.9; border-bottom: 1px dashed rgba(0,0,0,0.06); }
    .rec:last-child { border-bottom: 0; }
    .rec .t { color: #b0a292; margin-right: 6px; }
    .rec.A { color: var(--c-A); }
    .rec.B { color: var(--c-B); }
    .rec.milestone { color: var(--c-gold); font-weight: 800; }
    .rec-empty { color: #b0a292; font-size: 12px; text-align: center; padding: 16px 0; }

    /* ============================================================
       升级庆祝（全屏彩带/烟花）
       ============================================================ */
    .celebrate {
      position: fixed; inset: 0; z-index: 100; display: none;
      align-items: center; justify-content: center; pointer-events: none;
      background: rgba(0,0,0,0.15);
    }
    .celebrate.show { display: flex; }
    .celebrate .banner {
      background: linear-gradient(160deg, #fff, #fff2d8);
      border: 3px solid #ffb800; border-radius: 20px; padding: 22px 30px;
      text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      animation: pop .5s cubic-bezier(.34,1.56,.64,1);
    }
    .celebrate .banner .big { font-size: 24px; color: #ff7a00; font-weight: 800; }
    .celebrate .banner .sub { font-size: 15px; color: #d98600; margin-top: 6px; }
    @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .confetti { position: fixed; top: -20px; width: 10px; height: 16px; z-index: 99; opacity: .95; will-change: transform; }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

    /* ============================================================
       满员 / 遮罩提示
       ============================================================ */
    .overlay {
      position: fixed; inset: 0; z-index: 200; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(40,28,18,0.88); color: #fff; text-align: center; padding: 30px;
    }
    .overlay.show { display: flex; }
    .overlay .em { font-size: 60px; margin-bottom: 12px; }
    .overlay h2 { font-size: 22px; margin-bottom: 10px; }
    .overlay p { font-size: 14px; opacity: .85; line-height: 1.7; }
    .overlay button {
      margin-top: 18px; padding: 10px 26px; border: 0; border-radius: 999px;
      background: #ff7a00; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* 响应式：小屏微调 */
    @media (max-height: 720px) {
      .stage { height: 300px; }
      .cat-scale { bottom: 34px; }
    }
    @media (max-width: 360px) {
      .btn { font-size: 13px; min-height: 56px; }
      .topbar h1 { font-size: 18px; }
    }
  </style>
  <div class="app">
    <!-- 顶部栏 -->
    <header class="topbar">
      <h1><span class="paw">🐾</span> 线上小猫 <span class="paw">🐾</span></h1>
      <div class="topline">
        <span class="stage-badge" id="stageName">幼猫期</span>
        <span class="presence">
          <span class="dot A">A<i id="dotA"></i></span>
          <span class="dot B">B<i id="dotB"></i></span>
        </span>
        <span class="total-badge">互动 <span id="totalTop">0</span></span>
      </div>
      <div class="offline-hint" id="offlineHint"></div>
    </header>

    <!-- 舞台：猫窝 + 猫咪 + 气泡 -->
    <section class="stage">
      <div class="bed"></div>
      <div class="speech" id="speech">喵呜~</div>
      <div class="cat-scale" id="catScale">
        <!-- 内联 SVG 卡通橘猫 -->
        <div class="cat mood-normal" id="cat">
          <svg class="cat-svg" viewBox="0 0 220 250" xmlns="http://www.w3.org/2000/svg" aria-label="卡通橘猫">
            <defs>

            </defs>

            <!-- 尾巴（蓬松卷曲，摆动） -->

              <path d="M168,208 C214,202 214,148 187,137 C170,130 158,148 172,160"

            <!-- 身体 -->

              <!-- 后腿（两侧，藏在身体后） -->

              <ellipse cx="162" cy="226" rx="14" ry="17" fill="url(#furGrad)" stroke="#EE7A12" stroke-width="2"/>
              <!-- 身体主体 -->
              <ellipse cx="110" cy="197" rx="61" ry="47" fill="url(#furGrad)" stroke="#EE7A12" stroke-width="2"/>

            <!-- 头部 + 表情（吃 / 蹭动画作用对象） -->

              <!-- 耳朵（小三角，内耳粉色） -->

              <!-- 胡须（左右各三根） -->

                <path d="M60,104 L24,98"/>
                <path d="M60,112 L22,112"/>

                <path d="M160,104 L196,98"/>
                <path d="M160,112 L198,112"/>
                <path d="M160,120 L196,126"/>
              </g>

              <!-- 眼睛：正常（超大圆眼 + 高光，含眨眼动画） -->

                <circle cx="86" cy="99" r="14" fill="#3A2A18"/>

                <circle cx="82" cy="94" r="5" fill="#fff"/>
                <circle cx="130" cy="94" r="5" fill="#fff"/>

                <circle cx="138" cy="104" r="2.4" fill="#fff" opacity=".85"/>

              <!-- 眼睛：开心（月牙形） -->
              <g id="eyesHappy" style="display:none">
                <path d="M72,102 Q86,86 100,102" fill="none" stroke="#3A2A18" stroke-width="5" stroke-linecap="round"/>
                <path d="M120,102 Q134,86 148,102" fill="none" stroke="#3A2A18" stroke-width="5" stroke-linecap="round"/>
              </g>
              <!-- 眼睛：难过（半闭 + 泪滴 + 八字眉） -->
              <g id="eyesSad" style="display:none">
                <ellipse cx="86" cy="103" rx="13" ry="9" fill="#fff"/>
                <ellipse cx="134" cy="103" rx="13" ry="9" fill="#fff"/>
                <circle cx="86" cy="106" r="7" fill="#3A2A18"/>
                <circle cx="134" cy="106" r="7" fill="#3A2A18"/>
                <path d="M70,88 Q80,84 92,90" fill="none" stroke="#8A5A2A" stroke-width="3" stroke-linecap="round"/>
                <path d="M150,88 Q140,84 128,90" fill="none" stroke="#8A5A2A" stroke-width="3" stroke-linecap="round"/>
                <path d="M79,113 q-6,8 -1,15 q6,-3 1,-15" fill="#7FB6FF"/>
              </g>
              <!-- 眼睛：睡觉（闭眼弧线） -->
              <g id="eyesSleep" style="display:none">
                <path d="M72,100 Q86,111 100,100" fill="none" stroke="#6B4A2E" stroke-width="4" stroke-linecap="round"/>
                <path d="M120,100 Q134,111 148,100" fill="none" stroke="#6B4A2E" stroke-width="4" stroke-linecap="round"/>
              </g>

              <!-- 鼻子（粉色小三角） -->
              <path d="M104,116 L116,116 L110,123 Z" fill="#FF7DA0"/>

              <!-- 嘴：正常 W 形 -->
              <g id="mouthNormal">
                <path d="M110,123 Q104,132 98,127" fill="none" stroke="#7A4A22" stroke-width="2.6" stroke-linecap="round"/>
                <path d="M110,123 Q116,132 122,127" fill="none" stroke="#7A4A22" stroke-width="2.6" stroke-linecap="round"/>
              </g>
              <!-- 嘴：开心（大笑） -->
              <g id="mouthHappy" style="display:none">
                <path d="M97,124 Q110,145 123,124 Z" fill="#C0405A"/>
                <path d="M101,127 Q110,136 119,127 Z" fill="#FF9DB6"/>
              </g>
              <!-- 嘴：难过（倒 W） -->
              <g id="mouthSad" style="display:none">
                <path d="M100,131 Q110,123 120,131" fill="none" stroke="#7A4A22" stroke-width="2.6" stroke-linecap="round"/>
              </g>

              <!-- 项圈 + 金色铃铛 -->
              <path d="M64,150 Q110,177 156,150" fill="none" stroke="#E8483A" stroke-width="9" stroke-linecap="round"/>
              <circle cx="110" cy="167" r="10" fill="url(#bellGrad)" stroke="#C77F0A" stroke-width="1"/>
              <line x1="110" y1="161" x2="110" y2="171" stroke="#A9740B" stroke-width="1.6"/>
              <circle cx="110" cy="171" r="2.4" fill="#A9740B"/>
            </g>

            <!-- ZZZ 睡觉标识 -->
            <g id="zzz" class="cat-zzz" style="display:none" fill="#7A5A2A" font-weight="800" font-family="Arial, sans-serif">
              <text x="150" y="48" font-size="16">Z</text>
              <text x="165" y="34" font-size="12">z</text>
              <text x="177" y="24" font-size="9">z</text>
            </g>
          </svg>
        </div>
      </div>
    </section>

    <!-- 属性 + 成长进度 -->
    <section class="panel">
      <div class="stats">
        <div class="stat-row"><span class="stat-label">饱腹</span><div class="bar fullness"><i id="barFullness"></i></div><span class="stat-val" id="valFullness">50</span></div>
        <div class="stat-row"><span class="stat-label">快乐</span><div class="bar happiness"><i id="barHappiness"></i></div><span class="stat-val" id="valHappiness">50</span></div>
        <div class="stat-row"><span class="stat-label">清洁</span><div class="bar cleanliness"><i id="barCleanliness"></i></div><span class="stat-val" id="valCleanliness">50</span></div>
        <div class="stat-row"><span class="stat-label">精力</span><div class="bar energy"><i id="barEnergy"></i></div><span class="stat-val" id="valEnergy">50</span></div>
      </div>
      <div class="growth">
        <div class="growth-top">
          <span>成长进度 · <b id="growthStage">幼猫期</b></span>
          <span id="growthRemain">距下一阶段还需 10 次</span>
        </div>
        <div class="growth-bar"><i id="growthBar"></i></div>
        <div class="growth-top" style="margin-top:4px;">
          <span>今日互动 <b id="todayCount">0</b></span>
          <span>总互动 <b id="totalCount">0</b></span>
        </div>
      </div>
    </section>

    <!-- 操作按钮 -->
    <section class="actions">
      <button class="btn feed"  data-action="feed"><span class="ico" id="feedIco">🍼</span><span>喂食</span><span class="cd" id="cdFeed"></span></button>
      <button class="btn play"  data-action="play"><span class="ico">🎈</span><span>逗猫</span><span class="cd" id="cdPlay"></span></button>
      <button class="btn clean" data-action="clean"><span class="ico">🛁</span><span>洗澡</span><span class="cd" id="cdClean"></span></button>
      <button class="btn pet"   data-action="pet"><span class="ico">🤚</span><span>抚摸</span><span class="cd" id="cdPet"></span></button>
    </section>

    <!-- 喂养记录 -->
    <section class="records-wrap">
      <div class="records-title">📖 喂养记录（最新在上）</div>
      <div class="records" id="records"><div class="rec-empty">还没有记录，快来喂喂小猫吧～</div></div>
    </section>
  </div>

  <!-- 升级庆祝 -->
  <div class="celebrate" id="celebrate">
    <div class="banner"><div class="big">🎉 你的小猫长大啦！</div><div class="sub" id="celebrateSub">进入 少年期</div></div>
  </div>

  <!-- 满员遮罩 -->
  <div class="overlay" id="overlay">
    <div class="em">🙀</div>
    <h2 id="overlayTitle">小猫之家已满员</h2>
    <p id="overlayMsg">目前已有两位铲屎官在线啦，最多只能 2 人同时照顾小猫～<br/>请稍后再来看看吧！</p>
    <button onclick="location.reload()">重新尝试</button>
  </div>

  <!-- Socket.io 客户端由服务端 /socket.io/socket.io.js 提供 -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    /* ========================================================
       客户端逻辑
       ======================================================== */

    // 1) 设备身份：localStorage 记住 clientId，刷新保持原身份
    function genId() {
      return 'c-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
    }
    let clientId = localStorage.getItem('catClientId');
    if (!clientId) { clientId = genId(); localStorage.setItem('catClientId', clientId); }

    let myRole = null;                 // 'A' | 'B'
    const cooldownEnd = {};            // { action: 到期时间戳 }
    const COOLDOWN_MS = 8000;

    const $ = (id) => document.getElementById(id);
    const cat = $('cat');

    // 2) 建立连接
    const socket = io({ transports: ['websocket', 'polling'] });

    socket.on('connect', () => { socket.emit('join', { clientId }); });

    // 满员：显示遮罩
    socket.on('full', (d) => {
      $('overlayTitle').textContent = '小猫之家已满员';
      $('overlayMsg').innerHTML = (d && d.message ? d.message : '最多 2 人同时在线') + '<br/>请稍后再来看看吧！';
      $('overlay').classList.add('show');
    });
    socket.on('rejected', (d) => {
      $('overlayTitle').textContent = '暂时无法进入';
      $('overlayMsg').textContent = (d && d.message) || '请刷新重试';
      $('overlay').classList.add('show');
    });

    // 分配身份
    socket.on('assigned', (d) => {
      myRole = d.role;
      document.title = `线上小猫 · 你是用户${myRole}`;
      if (d.snapshot) render(d.snapshot);
    });

    // 完整状态更新
    socket.on('state', render);

    // 上线/离线通知
    socket.on('presence', (d) => {
      showOfflineHint();
      if (d && d.message) toast(d.message);
    });

    // 操作浮动反馈 + 猫咪动画
    socket.on('feedback', (d) => {
      floatFeedback(d.text);
      playActionAnim(d.action);
      if (d.action === 'feed') speak('啊呜~ 好好吃！');
      else if (d.action === 'play') speak('喵喵喵！');
      else if (d.action === 'pet') speak('呼噜呼噜~');
      else if (d.action === 'clean') speak('喵~ 香香的');
    });

    // 冷却反馈（服务端下发剩余时间）
    socket.on('cooldown', (d) => {
      if (!d || !d.action) return;
      cooldownEnd[d.action] = Date.now() + (d.remainMs || 0);
    });

    // 升级庆祝
    socket.on('levelup', (d) => {
      $('celebrateSub').textContent = '进入 ' + d.stageName;
      const box = $('celebrate');
      box.classList.add('show');
      launchConfetti();
      setTimeout(() => box.classList.remove('show'), 2600);
    });

    // 3) 按钮点击 → 发送操作
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        if (!myRole) return;
        if (Date.now() < (cooldownEnd[action] || 0)) return; // 冷却中
        socket.emit('action', { action });
      });
    });

    /* ---------------- 渲染 ---------------- */
    const STAT_KEYS = ['fullness', 'happiness', 'cleanliness', 'energy'];
    const CAP = (s) => s.charAt(0).toUpperCase() + s.slice(1);

    function render(s) {
      if (!s) return;
      // 属性条
      STAT_KEYS.forEach(k => {
        const v = s.stats[k];
        $('bar' + CAP(k)).style.width = v + '%';
        $('val' + CAP(k)).textContent = v;
      });
      // 顶部 / 成长
      $('stageName').textContent = s.stageName;
      $('growthStage').textContent = s.stageName;
      $('totalTop').textContent = s.totalInteractions;
      $('totalCount').textContent = s.totalInteractions;
      $('todayCount').textContent = s.todayInteractions;
      // 成长进度条
      if (s.nextInfo && !s.nextInfo.isMax) {
        const span = s.nextInfo.next - s.nextInfo.current;
        const done = s.totalInteractions - s.nextInfo.current;
        $('growthBar').style.width = Math.min(100, Math.round(done / span * 100)) + '%';
        $('growthRemain').textContent = '距下一阶段还需 ' + s.nextInfo.remain + ' 次';
      } else {
        $('growthBar').style.width = '100%';
        $('growthRemain').textContent = '已成长为大猫 · 满级啦！';
      }
      // 体型缩放
      $('catScale').style.transform = 'translateX(-50%) scale(' + s.scale + ')';
      // 表情
      cat.classList.remove('mood-happy', 'mood-normal', 'mood-sad', 'mood-sleep');
      cat.classList.add('mood-' + s.mood);
      setCatFace(s.mood);
      // 气泡默认叫声
      if (!speakTimer) $('speech').textContent = s.sleeping ? 'Zzz…' : '喵呜~';
      // 喂食按钮图标随阶段变化
      if (s.food) { $('feedIco').textContent = s.food.icon; }
      // 在线状态
      $('dotA').className = s.online.A ? 'on' : '';
      $('dotB').className = s.online.B ? 'on' : '';
      lastOnline = s.online;
      showOfflineHint();
      // 记录
      renderRecords(s.records);
    }

    /* 通过 JS 控制 SVG 内部元素的显示/隐藏，切换猫咪表情 */
    function setCatFace(mood) {
      const FACES = {
        normal: { eyes: 'eyesOpen',  mouth: 'mouthNormal' },
        happy:  { eyes: 'eyesHappy', mouth: 'mouthHappy'  },
        sad:    { eyes: 'eyesSad',   mouth: 'mouthSad'    },
        sleep:  { eyes: 'eyesSleep', mouth: 'mouthNormal' }
      };
      const f = FACES[mood] || FACES.normal;
      ['eyesOpen', 'eyesHappy', 'eyesSad', 'eyesSleep'].forEach(id => {
        const el = $(id); if (el) el.style.display = (id === f.eyes) ? '' : 'none';
      });
      ['mouthNormal', 'mouthHappy', 'mouthSad'].forEach(id => {
        const el = $(id); if (el) el.style.display = (id === f.mouth) ? '' : 'none';
      });
      const z = $('zzz'); if (z) z.style.display = (mood === 'sleep') ? '' : 'none';
    }

    let lastOnline = { A: false, B: false };
    function showOfflineHint() {
      const hint = $('offlineHint');
      if (!myRole) { hint.textContent = ''; return; }
      const other = myRole === 'A' ? 'B' : 'A';
      hint.textContent = lastOnline[other] ? '' : '对方已离线';
    }

    function renderRecords(records) {
      const box = $('records');
      if (!records || !records.length) { box.innerHTML = '<div class="rec-empty">还没有记录，快来喂喂小猫吧～</div>'; return; }
      box.innerHTML = records.map(r => {
        if (r.type === 'milestone') {
          return `<div class="rec milestone">[${r.time}] ${r.text}</div>`;
        }
        const detail = r.detail ? ' · ' + r.detail : '';
        return `<div class="rec ${r.role}"><span class="t">[${r.time}]</span>${r.role} ${r.action}${detail}</div>`;
      }).join('');
    }

    /* ---------------- 动画 / 反馈 ---------------- */
    function playActionAnim(action) {
      const map = { feed: 'anim-eat', play: 'anim-jump', pet: 'anim-nuzzle', clean: 'anim-shake' };
      const cls = map[action];
      if (!cls) return;
      cat.classList.remove('anim-eat', 'anim-jump', 'anim-nuzzle', 'anim-shake');
      void cat.offsetWidth; // 触发重绘以重启动画
      cat.classList.add(cls);
      setTimeout(() => cat.classList.remove(cls), 700);
    }

    function floatFeedback(text) {
      const el = document.createElement('div');
      el.className = 'float-feedback';
      el.textContent = text;
      document.querySelector('.stage').appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    let speakTimer = null;
    function speak(text) {
      $('speech').textContent = text;
      clearTimeout(speakTimer);
      speakTimer = setTimeout(() => { speakTimer = null; }, 1600);
    }

    // 简易 toast
    let toastTimer = null;
    function toast(msg) {
      let t = $('toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        t.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);color:#fff;padding:8px 16px;border-radius:999px;font-size:13px;z-index:150;transition:opacity .3s;';
        document.body.appendChild(t);
      }
      t.textContent = msg; t.style.opacity = '1';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }

    /* ---------------- 冷却倒计时（每 200ms 刷新按钮） ---------------- */
    const CD_MAP = { feed: 'cdFeed', play: 'cdPlay', clean: 'cdClean', pet: 'cdPet' };
    setInterval(() => {
      document.querySelectorAll('.btn').forEach(btn => {
        const action = btn.dataset.action;
        const remain = (cooldownEnd[action] || 0) - Date.now();
        const cd = $(CD_MAP[action]);
        if (remain > 0) {
          btn.classList.add('cooling');
          btn.disabled = true;
          cd.textContent = Math.ceil(remain / 1000) + 's';
        } else {
          btn.classList.remove('cooling');
          btn.disabled = false;
          cd.textContent = '';
        }
      });
    }, 200);

    /* ---------------- 彩带/烟花 ---------------- */
    function launchConfetti() {
      const colors = ['#ff7a00', '#ff5c8a', '#4a9eff', '#2ed573', '#ffb800', '#a55eff'];
      for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        const dur = 1.8 + Math.random() * 1.6;
        c.style.animation = `fall ${dur}s linear forwards`;
        c.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), dur * 1000 + 200);
      }
    }
  </script>
</body>
</html>
